site_name: Allay Auth
site_description: Discord-based 2FA and account-linking plugin for Paper, Folia, Purpur and Bukkit-family Minecraft servers.
site_author: cryals
repo_url: https://github.com/cryals/allay-auth
repo_name: cryals/allay-auth
edit_uri: edit/main/docs/

theme:
  name: readthedocs
  language: ru
  highlightjs: true

extra_css:
  - css/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - tables
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Быстрый старт: getting-started.md
  - Как работает авторизация: auth-flow.md
  - Архитектура: architecture.md
  - Конфигурация: configuration.md
  - Discord: discord.md
  - Minecraft: minecraft.md
  - Хранилище: storage.md
  - Безопасность: security.md
  - API и события: api-events.md
  - Web API: web-api.md
  - CI/CD и релизы: ci-cd.md
  - Справочник:
      - Файлы проекта: reference/files.md
      - Функции и методы: reference/functions.md

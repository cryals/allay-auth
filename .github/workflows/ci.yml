name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install YAML linter
        run: python -m pip install --upgrade yamllint

      - name: Lint YAML
        run: yamllint .

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2

      - name: Lint GitHub Actions
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            rhysd/actionlint:1.7.7

  build:
    name: Build plugin (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        java:
          - "21"
          - "25"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Validate Maven project
        run: mvn -B -DskipTests validate

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Upload plugin jar
        if: matrix.java == '21'
        uses: actions/upload-artifact@v4
        with:
          name: AllayAuth-java21
          path: target/AllayAuth-*.jar
          if-no-files-found: error

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs

      - name: Build MkDocs in strict mode
        run: mkdocs build --strict

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3 or v1.2.3-beta.1, got: $tag"
            exit 1
          fi

      - name: Checkout requested tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags --force
          git checkout "${{ steps.version.outputs.tag }}"

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp target/AllayAuth-*.jar "dist/AllayAuth-${{ steps.version.outputs.tag }}.jar"
          sha256sum "dist/AllayAuth-${{ steps.version.outputs.tag }}.jar" > "dist/AllayAuth-${{ steps.version.outputs.tag }}.jar.sha256"
          cat "dist/AllayAuth-${{ steps.version.outputs.tag }}.jar.sha256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/AllayAuth-${{ steps.version.outputs.tag }}.jar \
            dist/AllayAuth-${{ steps.version.outputs.tag }}.jar.sha256 \
            --title "Allay Auth ${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --verify-tag
